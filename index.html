<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="hero">
        <div class="overlay"></div>
        <h1>Experience the Magic of Christmas Lights!</h1>
        <p>Support a great cause and enjoy our beautiful holiday display.</p>
        <button onclick="window.location.href='donate-link'">Donate Now</button>
    
        <div class="sleigh">
            <img src="/assets/santa.svg" alt="Moving Santa" class="moving-graphic">
            <div class="banner"><span>MERRY CHRISTMAS</span></div>
        </div>

        <div class="animation-container">
            <img src="/assets/snowman maybe.svg" alt="Snowman" class="snowman">
            <img src="/assets/main-image.jpeg" alt="main image" class="pushed-image">
        </div>

    </section>
    
</body>


<script src="snow.js"></script>
</html>
